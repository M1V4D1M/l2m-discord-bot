steps:
  # 1. Собираем Docker образ
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/discord-bot:$COMMIT_SHA', '.']

  # 2. Пушим образ в реестр (GCR)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/discord-bot:$COMMIT_SHA']

  # 3. Деплоим в Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'discord-bot'
      - '--image'
      - 'gcr.io/$PROJECT_ID/discord-bot:$COMMIT_SHA'
      - '--region'
      - 'europe-west1' # Можно заменить на ваш регион
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-secrets=DISCORD_BOT_TOKEN=DISCORD_BOT_TOKEN:latest,NOTION_API_TOKEN=NOTION_API_TOKEN:latest,NOTION_DATABASE_ID=NOTION_DATABASE_ID:latest,DISCORD_PUBLIC_KEY=DISCORD_PUBLIC_KEY:latest'
      - '--set-env-vars=DISCORD_APP_ID=1392154935314878558,SKIP_SIGNATURE_VERIFICATION=false'

# Список образов, которые нужно сохранить
images:
  - 'gcr.io/$PROJECT_ID/discord-bot:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
